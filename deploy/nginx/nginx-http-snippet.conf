# Add inside http { } in /etc/nginx/nginx.conf (before include conf.d/*.conf)
#
#   limit_req_zone $binary_remote_addr zone=atelier_general:10m rate=10r/s;
#   limit_req_zone $binary_remote_addr zone=atelier_static:10m rate=20r/s;
#   limit_req_zone $binary_remote_addr zone=atelier_heavy:10m rate=5r/s;
#   limit_conn_zone $binary_remote_addr zone=atelier_conn:10m;
#
# Then: sudo nginx -t && sudo systemctl reload nginx

limit_req_zone $binary_remote_addr zone=atelier_general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=atelier_static:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=atelier_heavy:10m rate=5r/s;
limit_conn_zone $binary_remote_addr zone=atelier_conn:10m;

server_tokens off;
